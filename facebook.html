<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Bannière Facebook — Deck Goliath</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=EB+Garamond:ital,wght@1,400&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#111; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; }

  .banniere {
    width: 820px;
    height: 312px;
    position: relative;
    overflow: hidden;
    background: #0A0806;
  }

  .bg {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 55% 80% at 65% 50%, rgba(70,45,8,0.55) 0%, transparent 65%),
      #0A0806;
  }

  .eagle {
    position: absolute;
    right: 160px;
    top: 50%;
    transform: translateY(-50%);
    height: 320px;
    width: auto;
    opacity: 0.2;
    mix-blend-mode: screen;
    pointer-events: none;
  }

  /* LIGNE 1 */
  .top-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 32px;
    background: rgba(0,0,0,0.55);
    border-bottom: 1px solid rgba(201,150,42,0.25);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 20px;
    z-index: 3;
  }
  .top-phone {
    font-family: 'Montserrat', sans-serif;
    font-size: 12px;
    font-weight: 600;
    color: rgba(201,150,42,0.9);
    letter-spacing: 1px;
    white-space: nowrap;
  }
  .top-slogan {
    font-family: 'EB Garamond', serif;
    font-size: 14px;
    font-style: italic;
    color: rgba(240,234,214,0.7);
  }

  /* LIGNE 2 */
  .middle {
    position: absolute;
    top: 32px;
    left: 0; right: 0;
    bottom: 48px;
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 14px;
    z-index: 2;
  }
  .badge-img {
    height: 112px;
    width: auto;
    flex-shrink: 0;
    filter: drop-shadow(0 0 10px rgba(201,150,42,0.4));
  }
  .logo-img {
    height: 128px;
    width: auto;
    flex-shrink: 0;
    filter: drop-shadow(0 0 15px rgba(201,150,42,0.3));
  }
  .divider-v {
    width: 1px;
    height: 90px;
    background: linear-gradient(to bottom, transparent, rgba(201,150,42,0.5), transparent);
    flex-shrink: 0;
  }
  .trois-mots {
    flex: 1;
    font-family: 'Cinzel', serif;
    font-size: 40px;
    font-weight: 700;
    line-height: 1.0;
    color: #F0EAD6;
    letter-spacing: -0.5px;
    white-space: nowrap;
  }
  .trois-mots .gold { color: #E8B84B; }

  /* LIGNE 3 */
  .fab-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 48px;
    background: rgba(20,16,10,0.9);
    border-top: 1px solid rgba(201,150,42,0.2);
    display: flex;
    align-items: center;
    justify-content: space-around;
    padding: 0 16px;
    z-index: 3;
  }
  .fab-bar img {
    height: 26px;
    width: auto;
    max-width: 110px;
    object-fit: contain;
    opacity: 0.8;
    filter: grayscale(15%) brightness(0.85);
  }
  .fab-fallback {
    font-family: 'Cinzel', sans-serif;
    font-size: 9px;
    color: rgba(201,150,42,0.65);
    letter-spacing: 1px;
    white-space: nowrap;
  }
</style>
</head>
<body>
<div class="banniere">
  <div class="bg"></div>
  <img src="assets/eagle-line.png" class="eagle" alt="" onerror="this.style.display='none'">

  <!-- LIGNE 1 : Téléphone + Slogan -->
  <div class="top-bar">
    <span class="top-phone">📞 819-484-7851</span>
    <span class="top-slogan">Vos besoins, vos rêves, notre spécialité!</span>
  </div>

  <!-- LIGNE 2 : Badge + Logo + 3 mots -->
  <div class="middle">
    <img src="assets/choix-president.png" class="badge-img" alt="Choix du consommateur 2026" onerror="this.style.display='none'">
    <img src="assets/logo.png" class="logo-img" alt="Deck Goliath" onerror="this.style.display='none'">
    <div class="divider-v"></div>
    <div class="trois-mots">
      Minimaliste.<br>
      <span class="gold">Luxueux.</span><br>
      Inébranlable.
    </div>
  </div>

  <!-- LIGNE 3 : Fabriquants -->
  <div class="fab-bar">
    <img src="assets/fabriquant1.png" alt="Deckorators" onerror="this.outerHTML='<span class=fab-fallback>Deckorators</span>'">
    <img src="assets/fabriquant2.png" alt="TimberTech"  onerror="this.outerHTML='<span class=fab-fallback>TimberTech</span>'">
    <img src="assets/fabriquant3.png" alt="Google 5★"   onerror="this.outerHTML='<span class=fab-fallback>Google ★★★★★ 5.0</span>'">
    <img src="assets/fabriquant4.png" alt="Regal Ideas" onerror="this.outerHTML='<span class=fab-fallback>Regal Ideas</span>'">
    <img src="assets/fabriquant5.png" alt="DeckStars"   onerror="this.outerHTML='<span class=fab-fallback>DeckStars</span>'">
    <img src="assets/fabriquant6.png" alt="Choix conso" onerror="this.outerHTML='<span class=fab-fallback>Choix du consommateur</span>'">
  </div>

</div>
</body>
</html>
